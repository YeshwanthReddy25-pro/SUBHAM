<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: rgb(65, 201, 225);
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from{
                text-shadow: 0 0 5px rgb(65, 201, 225), 0 0 10px rgb(65, 201, 225);
            }
            to{
                text-shadow: 0 0 20px rgb(65, 201, 225),0 0 40px rgb(65, 201, 225) ;
            }
            
        }
    </style>
</head>
<body style="background-color: black;">
    <h1>Neon Text Glow</h1>
</body>
</html>
