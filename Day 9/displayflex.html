<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            display: flex;
            background-color: #f2f2f2;
            justify-content: center;
            height: 400px;
            align-items:center ;
            gap:30px;
            flex-direction:column;
        }
        .Box{
            border: 5px solid black;
            width: 100px;
            height:100px;
            text-align: center;
            font-family: fantasy;
            background-color: pink;
            font-size: larger;
            font-weight: lighter;
            
        }
    </style>
</head>
<body>
   <!--Flex displays in 1 Dimensional- Either in Row and Column-->
   <div class="product">
<div class="Box">Cake</div>
<div class="Box">Cookie</div>
<div class="Box">Pastry</div>
</div>


</body>
</html>
