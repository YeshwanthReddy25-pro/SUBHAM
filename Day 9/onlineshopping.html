<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: aliceblue;
            margin: 0;
        }
         .parent{
          display: grid;
          grid-template-columns : repeat(auto-fit, minmax(250px,1fr));
          gap: 30px;
        }
        .product{
            border: 1px solid black ;
            overflow: hidden;
            text-align: center;
            border-radius: 12px;
            box-shadow:0 2px 4px black;


        }
        .product img{
            object-fit:cover;
            height:200px;
            width:100%;
        }
   </style>
</head>
<body>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/18311092/pexels-photo-18311092.jpeg">
        <h2>Iphone</h2>
        <p>$500</p>
        <button>Add To Cart</button>
    </div>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/35825595/pexels-photo-35825595.jpeg">

        <h2>Cricket Bat</h2>
        <p>$100</p>
        <button>Add To Cart</button>
    </div>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/15487609/pexels-photo-15487609.jpeg">
        <h2>Headphones</h2>
        <p>$50</p>
        <button>Add To Cart</button>
    </div>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/21693934/pexels-photo-21693934.jpeg">
        <h2>Bag</h2>
        <p>$20</p>
        <button>Add To Cart</button>
    </div>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/4971354/pexels-photo-4971354.jpeg">
        <h2>Watch</h2>
        <p>$150</p>
        <button>Add To Cart</button>
    </div>
    <div class="parent">
        <div class="product"></div>
        <img src="https://images.pexels.com/photos/30547625/pexels-photo-30547625.jpeg">
        <h2>Shoe</h2>
        <p>$30</p>
        <button>Add To Cart</button>
    </div>
</body>
</html>
